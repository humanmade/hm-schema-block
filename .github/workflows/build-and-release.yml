name: Production Build & Release

on:
    push:
        branches:
            - main

concurrency:
    group: ${{ github.workflow }}-${{ github.ref_name }}
    cancel-in-progress: true

jobs:
    release:
        name: 'Update release branch'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Node
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: 'npm'

            - name: Install dependencies
              run: npm i

            - name: Set version from commit SHA
              run: sed -i "s/__VERSION__/dev-$(git rev-parse --short HEAD)/g" schema-org-blocks.php

            - name: Build
              run: npm run build

            - name: Create plugin ZIP
              run: npm run plugin-zip

            - name: Push to release branch
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git checkout -B release
                  git add -f build/ schema-org-blocks.zip
                  git add schema-org-blocks.php
                  git diff --cached --quiet || git commit -m "Release build from ${{ github.sha }}"
                  git push origin release --force
